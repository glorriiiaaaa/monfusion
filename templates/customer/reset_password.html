<div class="page" id="page-reset-password">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">🔒 Reset Password</div>
      <div class="auth-sub">Choose a new password for your account</div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="rpPw" class="form-control" placeholder="Min. 8 characters" oninput="validateField(this,'password')">
        <span class="form-error" id="rpPw-e">Password must be at least 8 characters</span>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="rpCpw" class="form-control" placeholder="Re-enter new password" oninput="validateField(this,'notempty')">
        <span class="form-error" id="rpCpw-e">Please confirm your password</span>
      </div>
      <span class="form-error" id="rpGenErr" style="display:block;font-size:.88rem;text-align:center;margin-bottom:12px"></span>
      <button class="btn-primary" style="width:100%;justify-content:center;margin-bottom:14px" id="rpBtn" onclick="doResetPassword()">Set New Password ✅</button>
      <div class="auth-switch">Back to <button onclick="showPage('login')">Sign In</button></div>
    </div>
  </div>
  <footer id="rpFooter"></footer>
</div>
