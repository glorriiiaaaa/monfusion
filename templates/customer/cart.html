<div class="page" id="page-cart">
  <div class="page-hero">
    <h1>Shopping Cart 🛍</h1>
    <p>Review your items before checkout</p>
  </div>
  <div class="cart-layout" id="cartLayout">
    <div>
      <div id="cartItems">
        <!-- filled by JS -->
      </div>
    </div>
    <div>
      <div class="order-summary" id="cartSummary">
        <h3>Order Summary</h3>
        <div class="min-order-note" id="minOrderNote">⚠️ Minimum order is ₹150</div>
        <div class="sum-row"><span>Subtotal</span><span id="sumSubtotal">₹0</span></div>
        <div class="sum-row"><span>Delivery</span><span id="sumDelivery">₹80</span></div>
        <div class="sum-row"><span style="color:#00c853">Savings</span><span style="color:#00c853" id="sumSavings">-₹0</span></div>
        <div class="sum-row total"><span>Total</span><span id="sumTotal">₹80</span></div>
        <button class="btn-primary" style="width:100%;justify-content:center;margin-top:18px;font-size:.95rem" id="checkoutBtn" onclick="goToCheckout()">
          Proceed to Checkout →
        </button>
        <button class="btn-ghost" style="width:100%;justify-content:center;margin-top:10px" onclick="showPage('products')">
          ← Continue Shopping
        </button>
        <p style="font-size:.76rem;color:var(--dg);text-align:center;margin-top:16px">🔒 Secure checkout · 📦 Fast delivery</p>
      </div>
    </div>
  </div>
  <footer id="cartFooter"></footer>
</div>
