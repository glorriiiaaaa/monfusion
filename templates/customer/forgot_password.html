<div class="page" id="page-forgot-password">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">🔑 Forgot Password</div>
      <div class="auth-sub">Enter your email and we'll send you a reset link</div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="fpEmail" class="form-control" placeholder="your@email.com" oninput="validateField(this,'email')">
        <span class="form-error" id="fpEmail-e">Enter a valid email address</span>
      </div>
      <span class="form-error" id="fpGenErr" style="display:block;font-size:.88rem;text-align:center;margin-bottom:12px"></span>
      <div id="fpSuccess" style="display:none;background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.3);border-radius:10px;padding:14px;text-align:center;font-size:.88rem;color:#00c853;margin-bottom:14px">
        ✅ If this email is registered, a reset link has been sent. Check your inbox!
      </div>
      <button class="btn-primary" style="width:100%;justify-content:center;margin-bottom:14px" id="fpBtn" onclick="doForgotPassword()">Send Reset Link 📧</button>
      <div class="auth-switch">Remember your password? <button onclick="showPage('login')">Sign In</button></div>
    </div>
  </div>
  <footer id="fpFooter"></footer>
</div>
