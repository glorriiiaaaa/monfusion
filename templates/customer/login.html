<div class="page" id="page-login">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">🔐 Sign In</div>
      <div class="auth-sub">Welcome back to Mons Fusion</div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="your@email.com" oninput="validateField(this,'email')">
        <span class="form-error" id="loginEmail-e">Enter a valid email address</span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPw" class="form-control" placeholder="Min. 8 characters" oninput="validateField(this,'notempty')">
        <span class="form-error" id="loginPw-e">Password is required</span>
      </div>
      <span class="form-error" id="loginGenErr" style="display:block;font-size:.88rem;text-align:center;margin-bottom:12px"></span>
      <button class="btn-primary" style="width:100%;justify-content:center;margin-bottom:14px" id="loginBtn" onclick="doLogin()">Sign In</button>
      <div style="text-align:center;margin-bottom:10px">
        <button onclick="showPage('forgot-password')" style="background:none;border:none;color:var(--ac);cursor:pointer;font-size:.83rem;text-decoration:underline">Forgot Password?</button>
      </div>
      <div class="auth-switch">Don't have an account? <button onclick="showPage('signup')">Sign Up</button></div>
      <p style="text-align:center;font-size:.77rem;color:var(--dg);margin-top:14px">
        By signing in you agree to our <button onclick="showPage('terms')" style="background:none;border:none;color:var(--ac);cursor:pointer;font-size:.77rem">Terms</button> &amp; <button onclick="showPage('privacy')" style="background:none;border:none;color:var(--ac);cursor:pointer;font-size:.77rem">Privacy Policy</button>
      </p>
    </div>
  </div>
  <footer id="loginFooter"></footer>
</div>
